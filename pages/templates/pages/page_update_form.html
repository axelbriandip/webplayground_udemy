{% extends 'core/base.html' %}
{% load static %}
{% block title %}Editar página{% endblock %}
{% block content %}
{% include 'pages/includes/page_menu.html'%}
<main role="main">
    <div class="container">
        <div class="row mt-3">
            <div class="col-md-9 mx-auto">
            <div>
                {% if 'ok' in request.GET %}
                    <p>Página editada correctamente.</p>
                    <a href="{% url 'pages:page' page.id page.title|slugify %}">Ver resultado</a>
                {% endif %}
                <form action="" method="post">{% csrf_token %}
                    <table>
                        {{ form.as_table }}
                    </table>
                    <br>
                    <input type="submit" value="Editar página" />
                </form>
            </div>
            </div>
        </div>
    </div>
</main>
{% endblock %}
